<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="940" fill="#f8fafc"/>

  <!-- ЗАГОЛОВОК -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">
    Архитектура калькулятора (вариант 2)
  </text>
  <text x="600" y="64" text-anchor="middle" font-size="14" fill="#64748b">
    UI на Qt 6 · парсер с рекурсивным спуском · функции варианта 2: ln, exp, sqrt, abs
  </text>

  <!-- ============================================================== -->
  <!-- ПОЛЬЗОВАТЕЛЬ                                                    -->
  <!-- ============================================================== -->
  <g>
    <rect x="450" y="95" width="300" height="60" rx="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="600" y="125" text-anchor="middle" font-size="16" font-weight="600" fill="#78350f">👤 Пользователь</text>
    <text x="600" y="143" text-anchor="middle" font-size="12" fill="#92400e">мышь + клавиатура</text>
  </g>

  <!-- ============================================================== -->
  <!-- СЛОЙ UI                                                         -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="190" width="1080" height="240" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="80" y="215" font-size="14" font-weight="700" fill="#1e40af">Слой UI · src/main.cpp + src/ui/</text>
    <text x="80" y="233" font-size="12" fill="#3b82f6">Графический интерфейс на Qt 6 — отображение и ввод. Не знает математики.</text>

    <!-- main.cpp -->
    <g filter="url(#shadow)">
      <rect x="90" y="252" width="180" height="160" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="180" y="277" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">main.cpp</text>
      <line x1="110" y1="287" x2="250" y2="287" stroke="#cbd5e1" stroke-width="1"/>
      <text x="180" y="307" text-anchor="middle" font-size="11" fill="#475569">точка входа</text>
      <text x="180" y="325" text-anchor="middle" font-size="11" fill="#475569">создаёт QApplication</text>
      <text x="180" y="343" text-anchor="middle" font-size="11" fill="#475569">фиксирует C-локаль</text>
      <text x="180" y="361" text-anchor="middle" font-size="11" fill="#475569">показывает MainWindow</text>
      <text x="180" y="379" text-anchor="middle" font-size="11" fill="#475569">запускает event-loop</text>
    </g>

    <!-- main_window -->
    <g filter="url(#shadow)">
      <rect x="300" y="252" width="220" height="160" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="410" y="277" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">main_window</text>
      <line x1="320" y1="287" x2="500" y2="287" stroke="#cbd5e1" stroke-width="1"/>
      <text x="410" y="307" text-anchor="middle" font-size="11" fill="#475569">главное окно (QMainWindow)</text>
      <text x="410" y="325" text-anchor="middle" font-size="11" fill="#475569">3 виджета дисплея</text>
      <text x="410" y="343" text-anchor="middle" font-size="11" fill="#475569">сетка 7×4 кнопок</text>
      <text x="410" y="361" text-anchor="middle" font-size="11" fill="#475569">обработка кликов и клавиш</text>
      <text x="410" y="379" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">compute() — главный сценарий</text>
    </g>

    <!-- button_layout -->
    <g filter="url(#shadow)">
      <rect x="550" y="252" width="180" height="160" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="640" y="277" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">button_layout</text>
      <line x1="570" y1="287" x2="710" y2="287" stroke="#cbd5e1" stroke-width="1"/>
      <text x="640" y="307" text-anchor="middle" font-size="11" fill="#475569">раскладка 7×4</text>
      <text x="640" y="325" text-anchor="middle" font-size="11" fill="#475569">массив ButtonSpec</text>
      <text x="640" y="343" text-anchor="middle" font-size="11" fill="#475569">label, row/col, kind, action</text>
      <text x="640" y="367" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">кнопки как данные,</text>
      <text x="640" y="383" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">не как код</text>
    </g>

    <!-- format -->
    <g filter="url(#shadow)">
      <rect x="760" y="252" width="170" height="160" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="845" y="277" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">format</text>
      <line x1="780" y1="287" x2="910" y2="287" stroke="#cbd5e1" stroke-width="1"/>
      <text x="845" y="307" text-anchor="middle" font-size="11" fill="#475569">÷ × − → / * -</text>
      <text x="845" y="325" text-anchor="middle" font-size="11" fill="#475569">format_result(double)</text>
      <text x="845" y="349" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">целые без точки</text>
      <text x="845" y="365" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">дробные без</text>
      <text x="845" y="381" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">хвостовых нулей</text>
    </g>

    <!-- theme -->
    <g filter="url(#shadow)">
      <rect x="960" y="252" width="160" height="160" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="1040" y="277" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">theme</text>
      <line x1="980" y1="287" x2="1100" y2="287" stroke="#cbd5e1" stroke-width="1"/>
      <text x="1040" y="307" text-anchor="middle" font-size="11" fill="#475569">QSS-стили</text>
      <text x="1040" y="325" text-anchor="middle" font-size="11" fill="#475569">палитра</text>
      <text x="1040" y="343" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Catppuccin Mocha</text>
      <text x="1040" y="367" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">цвета по типу</text>
      <text x="1040" y="383" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">кнопки</text>
    </g>
  </g>

  <!-- ============================================================== -->
  <!-- ГРАНИЦА МОДУЛЕЙ — единственный API между UI и parser            -->
  <!-- ============================================================== -->
  <g>
    <rect x="380" y="445" width="440" height="40" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="600" y="470" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">
      calc::evaluate(string) → double  ← единственный API между слоями
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- СЛОЙ ПАРСЕРА                                                    -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="500" width="1080" height="270" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="80" y="525" font-size="14" font-weight="700" fill="#14532d">Слой парсинга и вычисления · src/parser.{cpp,h}</text>
    <text x="80" y="543" font-size="12" fill="#16a34a">Класс Parser — рекурсивный спуск. Разбирает строку и сразу вычисляет результат. Не знает Qt.</text>

    <!-- parse_expression -->
    <g filter="url(#shadow)">
      <rect x="90" y="565" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="210" y="590" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">parse_expression</text>
      <line x1="110" y1="600" x2="310" y2="600" stroke="#cbd5e1" stroke-width="1"/>
      <text x="210" y="620" text-anchor="middle" font-size="11" fill="#475569">самые слабые операторы</text>
      <text x="210" y="640" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">+  и  −</text>
      <text x="210" y="664" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">expr := term ((+|−) term)*</text>
      <text x="210" y="690" text-anchor="middle" font-size="10" fill="#dc2626">проверка двойного</text>
      <text x="210" y="706" text-anchor="middle" font-size="10" fill="#dc2626">оператора (2++3)</text>
    </g>

    <!-- parse_term -->
    <g filter="url(#shadow)">
      <rect x="350" y="565" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="470" y="590" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">parse_term</text>
      <line x1="370" y1="600" x2="570" y2="600" stroke="#cbd5e1" stroke-width="1"/>
      <text x="470" y="620" text-anchor="middle" font-size="11" fill="#475569">средний приоритет</text>
      <text x="470" y="640" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">×  и  ÷</text>
      <text x="470" y="664" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">term := factor ((*|/) factor)*</text>
      <text x="470" y="690" text-anchor="middle" font-size="10" fill="#dc2626">проверка деления</text>
      <text x="470" y="706" text-anchor="middle" font-size="10" fill="#dc2626">на ноль</text>
    </g>

    <!-- parse_factor -->
    <g filter="url(#shadow)">
      <rect x="610" y="565" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="730" y="590" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">parse_factor</text>
      <line x1="630" y1="600" x2="830" y2="600" stroke="#cbd5e1" stroke-width="1"/>
      <text x="730" y="620" text-anchor="middle" font-size="11" fill="#475569">атомы выражения:</text>
      <text x="730" y="638" text-anchor="middle" font-size="11" fill="#475569">число · ( expr ) · −factor</text>
      <text x="730" y="656" text-anchor="middle" font-size="11" fill="#475569">имя ( expr )</text>
      <text x="730" y="680" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">унарный минус — рекурсией</text>
      <text x="730" y="704" text-anchor="middle" font-size="10" fill="#475569">parse_number, parse_function</text>
    </g>

    <!-- apply_function -->
    <g filter="url(#shadow)">
      <rect x="870" y="565" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="990" y="590" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">apply_function</text>
      <line x1="890" y1="600" x2="1090" y2="600" stroke="#cbd5e1" stroke-width="1"/>
      <text x="990" y="620" text-anchor="middle" font-size="11" fill="#475569">функции варианта 2:</text>
      <text x="990" y="640" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">ln · exp · sqrt · abs</text>
      <text x="990" y="668" text-anchor="middle" font-size="10" fill="#dc2626">ln: x &gt; 0</text>
      <text x="990" y="684" text-anchor="middle" font-size="10" fill="#dc2626">sqrt: x ≥ 0</text>
      <text x="990" y="700" text-anchor="middle" font-size="10" fill="#dc2626">exp: проверка переполнения</text>
    </g>

    <!-- Стрелки между функциями парсера -->
    <path d="M 330,655 L 350,655" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <path d="M 590,655 L 610,655" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <path d="M 850,655 L 870,655" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Возвратная стрелка (рекурсия для скобок и аргументов функций) -->
    <path d="M 730,745 C 600,795 380,795 230,745" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
    <text x="480" y="790" text-anchor="middle" font-size="11" font-style="italic" fill="#16a34a">рекурсия для скобок и аргументов функций</text>
  </g>

  <!-- ============================================================== -->
  <!-- СТРЕЛКИ — поток данных                                          -->
  <!-- ============================================================== -->

  <!-- Пользователь → main_window -->
  <path d="M 600,155 L 410,252" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="200" font-size="11" font-weight="600" fill="#334155">клик / клавиша</text>

  <!-- main → main_window -->
  <path d="M 230,300 L 300,300" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="293" font-size="10" fill="#64748b">создаёт</text>

  <!-- main_window → button_layout -->
  <path d="M 520,325 L 550,325" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="513" y="318" font-size="10" fill="#64748b">читает</text>

  <!-- main_window → format -->
  <path d="M 520,355 L 760,355" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="348" font-size="10" fill="#64748b">использует</text>

  <!-- main_window → theme -->
  <path d="M 520,290 C 700,290 880,290 960,290" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="800" y="283" font-size="10" fill="#64748b">применяет</text>

  <!-- compute() → calc::evaluate (через границу) -->
  <path d="M 410,412 L 410,445" fill="none" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="420" y="432" font-size="11" font-weight="600" fill="#0369a1">строка</text>

  <!-- calc::evaluate → parse_expression -->
  <path d="M 600,485 L 210,565" fill="none" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- parse_expression → calc::evaluate (результат) -->
  <path d="M 210,565 L 600,485" fill="none" stroke="none"/>
  <!-- result обратно к compute -->
  <path d="M 600,485 L 480,445 L 480,412" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="490" y="432" font-size="11" font-weight="600" fill="#15803d">double r</text>

  <!-- main_window → пользователь (вывод) -->
  <path d="M 410,252 L 600,160" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="5 3"/>
  <text x="425" y="220" font-size="11" font-weight="600" fill="#15803d">результат на дисплее</text>

  <!-- ============================================================== -->
  <!-- ЛЕГЕНДА                                                         -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="800" width="1080" height="125" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="80" y="825" font-size="13" font-weight="700" fill="#0f172a">Легенда</text>

    <rect x="80" y="840" width="14" height="14" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="102" y="852" font-size="12" fill="#334155">UI — Qt-виджеты, обработка пользовательских действий (5 модулей)</text>

    <rect x="80" y="865" width="14" height="14" fill="#dcfce7" stroke="#16a34a"/>
    <text x="102" y="877" font-size="12" fill="#334155">parser — разбор строки и вычисление результата (рекурсивный спуск, 1 файл)</text>

    <rect x="80" y="890" width="14" height="14" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="102" y="902" font-size="12" fill="#334155">граница слоёв — единственный публичный API: calc::evaluate(string) → double</text>

    <line x1="640" y1="847" x2="680" y2="847" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="690" y="852" font-size="12" fill="#334155">входные данные: строка выражения</text>

    <line x1="640" y1="872" x2="680" y2="872" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
    <text x="690" y="877" font-size="12" fill="#334155">результат: число (или сообщение об ошибке)</text>

    <line x1="640" y1="897" x2="680" y2="897" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="690" y="902" font-size="12" fill="#334155">служебная зависимость (создаёт, читает, использует)</text>
  </g>
</svg>
