<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="920" fill="#f8fafc"/>

  <!-- ЗАГОЛОВОК -->
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">
    Архитектура калькулятора (вариант 2)
  </text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#64748b">
    UI на Qt6 · парсер с рекурсивным спуском · функции варианта 2: ln, exp, sqrt, abs
  </text>

  <!-- ============================================================== -->
  <!-- ПОЛЬЗОВАТЕЛЬ                                                    -->
  <!-- ============================================================== -->
  <g>
    <rect x="450" y="100" width="300" height="60" rx="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="600" y="130" text-anchor="middle" font-size="16" font-weight="600" fill="#78350f">👤 Пользователь</text>
    <text x="600" y="148" text-anchor="middle" font-size="12" fill="#92400e">клики мышью + клавиатура</text>
  </g>

  <!-- ============================================================== -->
  <!-- СЛОЙ UI                                                         -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="200" width="1080" height="220" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="80" y="225" font-size="14" font-weight="700" fill="#1e40af">Слой UI · src/ui/ + src/main.cpp</text>
    <text x="80" y="243" font-size="12" fill="#3b82f6">Графический интерфейс на Qt6 — отвечает за отображение и ввод</text>

    <!-- main.cpp -->
    <g filter="url(#shadow)">
      <rect x="90" y="260" width="180" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="180" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">main.cpp</text>
      <line x1="110" y1="295" x2="250" y2="295" stroke="#cbd5e1" stroke-width="1"/>
      <text x="180" y="315" text-anchor="middle" font-size="11" fill="#475569">точка входа</text>
      <text x="180" y="333" text-anchor="middle" font-size="11" fill="#475569">создаёт QApplication</text>
      <text x="180" y="351" text-anchor="middle" font-size="11" fill="#475569">фиксирует C-локаль</text>
      <text x="180" y="369" text-anchor="middle" font-size="11" fill="#475569">показывает MainWindow</text>
    </g>

    <!-- main_window -->
    <g filter="url(#shadow)">
      <rect x="300" y="260" width="220" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="410" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">main_window</text>
      <line x1="320" y1="295" x2="500" y2="295" stroke="#cbd5e1" stroke-width="1"/>
      <text x="410" y="315" text-anchor="middle" font-size="11" fill="#475569">главное окно</text>
      <text x="410" y="333" text-anchor="middle" font-size="11" fill="#475569">обработка кликов и клавиш</text>
      <text x="410" y="351" text-anchor="middle" font-size="11" fill="#475569">compute() — главный сценарий</text>
      <text x="410" y="369" text-anchor="middle" font-size="11" fill="#475569">try/catch для ошибок</text>
    </g>

    <!-- button_layout -->
    <g filter="url(#shadow)">
      <rect x="550" y="260" width="180" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="640" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">button_layout</text>
      <line x1="570" y1="295" x2="710" y2="295" stroke="#cbd5e1" stroke-width="1"/>
      <text x="640" y="315" text-anchor="middle" font-size="11" fill="#475569">раскладка 7×4</text>
      <text x="640" y="333" text-anchor="middle" font-size="11" fill="#475569">список кнопок</text>
      <text x="640" y="351" text-anchor="middle" font-size="11" fill="#475569">тип каждой кнопки</text>
      <text x="640" y="369" text-anchor="middle" font-size="11" fill="#475569">данные, не код</text>
    </g>

    <!-- format -->
    <g filter="url(#shadow)">
      <rect x="760" y="260" width="170" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="845" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">format</text>
      <line x1="780" y1="295" x2="910" y2="295" stroke="#cbd5e1" stroke-width="1"/>
      <text x="845" y="315" text-anchor="middle" font-size="11" fill="#475569">÷ × − → / * -</text>
      <text x="845" y="333" text-anchor="middle" font-size="11" fill="#475569">форматирует</text>
      <text x="845" y="351" text-anchor="middle" font-size="11" fill="#475569">результат</text>
      <text x="845" y="369" text-anchor="middle" font-size="11" fill="#475569">для дисплея</text>
    </g>

    <!-- theme -->
    <g filter="url(#shadow)">
      <rect x="960" y="260" width="160" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="1040" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">theme</text>
      <line x1="980" y1="295" x2="1100" y2="295" stroke="#cbd5e1" stroke-width="1"/>
      <text x="1040" y="315" text-anchor="middle" font-size="11" fill="#475569">QSS-стили</text>
      <text x="1040" y="333" text-anchor="middle" font-size="11" fill="#475569">палитра</text>
      <text x="1040" y="351" text-anchor="middle" font-size="11" fill="#475569">Catppuccin</text>
      <text x="1040" y="369" text-anchor="middle" font-size="11" fill="#475569">Mocha</text>
    </g>
  </g>

  <!-- ============================================================== -->
  <!-- СЛОЙ ПАРСЕРА (один большой блок)                                -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="460" width="1080" height="280" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="80" y="485" font-size="14" font-weight="700" fill="#14532d">Слой парсинга и вычисления · src/parser.{cpp,h}</text>
    <text x="80" y="503" font-size="12" fill="#16a34a">Класс Parser — рекурсивный спуск. Разбирает строку и сразу вычисляет результат.</text>

    <!-- Главный API -->
    <g filter="url(#shadow)">
      <rect x="90" y="525" width="220" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="200" y="550" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">calc::evaluate(string)</text>
      <line x1="110" y1="560" x2="290" y2="560" stroke="#cbd5e1" stroke-width="1"/>
      <text x="200" y="580" text-anchor="middle" font-size="11" fill="#475569">публичный API</text>
      <text x="200" y="598" text-anchor="middle" font-size="11" fill="#475569">создаёт Parser и зовёт</text>
      <text x="200" y="616" text-anchor="middle" font-size="11" fill="#475569">parse() — точку входа</text>
      <text x="200" y="640" text-anchor="middle" font-size="11" font-style="italic" fill="#16a34a">"2.5 + sqrt(9)"</text>
      <text x="200" y="660" text-anchor="middle" font-size="11" fill="#475569">↓</text>
      <text x="200" y="678" text-anchor="middle" font-size="11" font-style="italic" fill="#16a34a">5.5</text>
    </g>

    <!-- parse_expression -->
    <g filter="url(#shadow)">
      <rect x="340" y="525" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="460" y="550" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">parse_expression</text>
      <line x1="360" y1="560" x2="560" y2="560" stroke="#cbd5e1" stroke-width="1"/>
      <text x="460" y="580" text-anchor="middle" font-size="11" fill="#475569">самые слабые операторы</text>
      <text x="460" y="598" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">+ и −</text>
      <text x="460" y="624" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">expr := term</text>
      <text x="460" y="640" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">((+|−) term)*</text>
      <text x="460" y="668" text-anchor="middle" font-size="10" fill="#94a3b8">проверка двойного оператора</text>
      <text x="460" y="684" text-anchor="middle" font-size="10" fill="#94a3b8">для случая "2++3"</text>
    </g>

    <!-- parse_term -->
    <g filter="url(#shadow)">
      <rect x="610" y="525" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="730" y="550" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">parse_term</text>
      <line x1="630" y1="560" x2="830" y2="560" stroke="#cbd5e1" stroke-width="1"/>
      <text x="730" y="580" text-anchor="middle" font-size="11" fill="#475569">средний приоритет</text>
      <text x="730" y="598" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">× и ÷</text>
      <text x="730" y="624" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">term := factor</text>
      <text x="730" y="640" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">((*|/) factor)*</text>
      <text x="730" y="668" text-anchor="middle" font-size="10" fill="#dc2626">проверка деления</text>
      <text x="730" y="684" text-anchor="middle" font-size="10" fill="#dc2626">на ноль</text>
    </g>

    <!-- parse_factor -->
    <g filter="url(#shadow)">
      <rect x="880" y="525" width="240" height="180" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
      <text x="1000" y="550" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">parse_factor</text>
      <line x1="900" y1="560" x2="1100" y2="560" stroke="#cbd5e1" stroke-width="1"/>
      <text x="1000" y="580" text-anchor="middle" font-size="11" fill="#475569">атомы выражения:</text>
      <text x="1000" y="600" text-anchor="middle" font-size="11" fill="#475569">число · ( expr ) · −factor</text>
      <text x="1000" y="618" text-anchor="middle" font-size="11" fill="#475569">имя ( expr )</text>
      <text x="1000" y="640" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">ln, exp, sqrt, abs</text>
      <text x="1000" y="668" text-anchor="middle" font-size="10" fill="#dc2626">проверка области</text>
      <text x="1000" y="684" text-anchor="middle" font-size="10" fill="#dc2626">определения</text>
    </g>

    <!-- Стрелки между функциями парсера -->
    <path d="M 310,600 L 340,600" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <path d="M 580,600 L 610,600" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <path d="M 850,600 L 880,600" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Возвратные стрелки (рекурсия) -->
    <path d="M 880,680 C 800,725 700,725 610,680" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
    <text x="730" y="725" text-anchor="middle" font-size="10" font-style="italic" fill="#16a34a">рекурсия для скобок и функций</text>
  </g>

  <!-- ============================================================== -->
  <!-- СТРЕЛКИ — поток данных                                          -->
  <!-- ============================================================== -->

  <!-- Пользователь → main_window -->
  <path d="M 600,160 L 410,260" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="205" font-size="11" font-weight="600" fill="#334155">клик / клавиша</text>

  <!-- main → main_window -->
  <path d="M 230,310 L 300,310" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="303" font-size="10" fill="#64748b">создаёт</text>

  <!-- main_window → button_layout -->
  <path d="M 520,330 L 550,330" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="513" y="322" font-size="10" fill="#64748b">читает</text>

  <!-- main_window → format -->
  <path d="M 520,360 L 760,360" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="353" font-size="10" fill="#64748b">использует</text>

  <!-- main_window → theme -->
  <path d="M 520,300 C 700,300 880,300 960,300" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="800" y="293" font-size="10" fill="#64748b">применяет</text>

  <!-- main_window → calc::evaluate -->
  <path d="M 410,390 L 410,440 L 200,440 L 200,525" fill="none" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="220" y="432" font-size="11" font-weight="600" fill="#0369a1">строка выражения</text>

  <!-- evaluate → main_window (результат) -->
  <path d="M 310,545 L 480,440 L 480,390" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="410" y="475" font-size="11" font-weight="600" fill="#15803d">double r</text>
  <text x="410" y="490" font-size="10" fill="#15803d">или ошибка</text>

  <!-- main_window → пользователь (вывод) -->
  <path d="M 410,260 L 600,165" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="5 3"/>
  <text x="425" y="220" font-size="11" font-weight="600" fill="#15803d">результат на дисплее</text>

  <!-- ============================================================== -->
  <!-- ЛЕГЕНДА                                                         -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="770" width="1080" height="135" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="80" y="795" font-size="13" font-weight="700" fill="#0f172a">Легенда</text>

    <rect x="80" y="810" width="14" height="14" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="102" y="822" font-size="12" fill="#334155">UI — Qt-виджеты, обработка пользовательских действий</text>

    <rect x="80" y="835" width="14" height="14" fill="#dcfce7" stroke="#16a34a"/>
    <text x="102" y="847" font-size="12" fill="#334155">parser — разбор строки и вычисление результата (рекурсивный спуск)</text>

    <line x1="600" y1="817" x2="640" y2="817" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="650" y="822" font-size="12" fill="#334155">входные данные: строка выражения</text>

    <line x1="600" y1="842" x2="640" y2="842" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
    <text x="650" y="847" font-size="12" fill="#334155">результат: посчитанное число (или сообщение об ошибке)</text>

    <line x1="600" y1="867" x2="640" y2="867" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="650" y="872" font-size="12" fill="#334155">служебная зависимость (создаёт, использует, читает)</text>

    <text x="80" y="887" font-size="11" fill="#dc2626" font-style="italic">Все ошибки (синтаксис, деление на 0, область определения) — std::runtime_error.</text>
    <text x="80" y="900" font-size="11" fill="#dc2626" font-style="italic">Ловятся одним catch в MainWindow::compute() и выводятся красным на дисплей.</text>
  </g>
</svg>
